# PlexMind release line: v0.8.16
services:
  # ---------------------------------------------------------------------------
  # Ollama â€” Local LLM server (recommendations + translation)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_DATA_DIR:-./data/ollama}:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  # ---------------------------------------------------------------------------
  # Whisper ASR â€” Speech-to-text transcription
  # ---------------------------------------------------------------------------
  whisper:
    image: ${WHISPER_IMAGE:-onerahmet/openai-whisper-asr-webservice:latest-gpu}
    container_name: whisper-asr-webservice
    restart: "no"
    ports:
      - "9000:9000"
    volumes:
      - ${WHISPER_CACHE_DIR:-./data/whisper-cache}:/root/.cache/whisper
      - "${WHISPER_TMP_DIR:-/tmp}:/tmp"
    environment:
      - ASR_MODEL=${WHISPER_MODEL:-turbo}
      - ASR_DEVICE=${WHISPER_DEVICE:-cuda}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Whisper is created by compose but controlled by PlexMind scripts.

  # ---------------------------------------------------------------------------
  # PlexMind â€” AI recommendation engine (FastAPI)
  # ---------------------------------------------------------------------------
  plexmind:
    build:
      context: ./plexmind
      dockerfile: Dockerfile
    image: plexmind:latest
    container_name: plexmind
    restart: unless-stopped
    ports:
      - "8000:8000"
    labels:
      net.unraid.docker.managed: "dockerman"
      net.unraid.docker.webui: "http://[IP]:[PORT:8000]/"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/FineChAInesium/PlexMind/main/templates/icon.png"
    volumes:
      - ./data:/app/data
      - "${MOVIES_DIR:-/mnt/data/media/Movies}:/media/movies"
      - "${TV_DIR:-/mnt/data/media/TV Shows}:/media/tv"
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_SOCKET_GID:-281}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - PLEX_URL=${PLEX_URL:-http://host.docker.internal:32400}
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEXMIND_API_KEY=${PLEXMIND_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - TVDB_API_KEY=${TVDB_API_KEY:-}
      - OMDB_API_KEY=${OMDB_API_KEY:-}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:12b}
      - MAX_RECOMMENDATIONS=${MAX_RECOMMENDATIONS:-10}
      - CANDIDATE_POOL_SIZE=${CANDIDATE_POOL_SIZE:-40}
      - MIN_HISTORY_ITEMS=${MIN_HISTORY_ITEMS:-3}
      - SUPPRESSION_DAYS=${SUPPRESSION_DAYS:-60}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-3600}
      - GPU_THRESHOLD_PCT=${GPU_THRESHOLD_PCT:-30}
      - GPU_BACKOFF_MINUTES=${GPU_BACKOFF_MINUTES:-30}
      - FEEDBACK_FILE=${FEEDBACK_FILE:-data/feedback.json}
      - SHOWN_RECS_FILE=${SHOWN_RECS_FILE:-data/shown_recs.json}
      - WATCHLIST_TRACK_FILE=${WATCHLIST_TRACK_FILE:-data/watchlist_track.json}
      - REC_HISTORY_FILE=${REC_HISTORY_FILE:-data/recommendation_history.json}
      - PLEXMIND_SCRIPT_MODE=${PLEXMIND_SCRIPT_MODE:-local}
      - SCRIPT_START_RATE_LIMIT=${SCRIPT_START_RATE_LIMIT:-60/hour}
      - PLEXMIND_SCRIPTS_DIR=/app/scripts
      - WHISPER_API_URL=http://whisper:9000/asr
      - WHISPER_CONTAINER_NAME=${WHISPER_CONTAINER_NAME:-whisper-asr-webservice}
      - OLLAMA_API_URL=http://ollama:11434/api/chat
      - OLLAMA_CONTAINER_NAME=${OLLAMA_CONTAINER_NAME:-ollama}
      - MOVIE_DIR=/media/movies
      - MOVIES_DIR=/media/movies
      - TV_DIR=/media/tv
      - TARGET_LANGUAGES=${TARGET_LANGUAGES:-zh,es-MX}
      - TRANSCRIBE_START_HOUR=${TRANSCRIBE_START_HOUR:-5}
      - TRANSCRIBE_END_HOUR=${TRANSCRIBE_END_HOUR:-12}
      - TRANSLATE_START_HOUR=${TRANSLATE_START_HOUR:-23}
      - TRANSLATE_END_HOUR=${TRANSLATE_END_HOUR:-3}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
      - TZ=${TZ:-UTC}
    depends_on:
      - ollama

  # ---------------------------------------------------------------------------
  # Scripts â€” Transcription, translation, maintenance pipeline
  # ---------------------------------------------------------------------------
  scripts:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    image: plexmind-scripts:latest
    container_name: plexmind-scripts
    restart: unless-stopped
    volumes:
      - "${MOVIES_DIR:-/mnt/data/media/Movies}:/media/movies"
      - "${TV_DIR:-/mnt/data/media/TV Shows}:/media/tv"
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_SOCKET_GID:-281}"
    environment:
      - WHISPER_API_URL=http://whisper:9000/asr
      - WHISPER_CONTAINER_NAME=${WHISPER_CONTAINER_NAME:-whisper-asr-webservice}
      - OLLAMA_API_URL=http://ollama:11434/api/chat
      - OLLAMA_CONTAINER_NAME=${OLLAMA_CONTAINER_NAME:-ollama}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:12b}
      - SCRIPTS_API_URL=${SCRIPTS_API_URL:-http://scripts:9010}
      - WHISPER_MODEL=${WHISPER_MODEL:-turbo}
      - MOVIES_DIR=/media/movies
      - TV_DIR=/media/tv
      - TARGET_LANGUAGES=${TARGET_LANGUAGES:-zh,es-MX}
      - WATERMARK_TEXT=${WATERMARK_TEXT:-Brought to you by PlexMind}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-7}
      - MAX_RUNTIME_MINUTES=${MAX_RUNTIME_MINUTES:-0}
      - SCRIPTS_API_PORT=${SCRIPTS_API_PORT:-9010}
      - GPU_THRESHOLD_PCT=${GPU_THRESHOLD_PCT:-30}
      - TZ=${TZ:-UTC}
    depends_on:
      - ollama

  # ---------------------------------------------------------------------------
  # FFmpeg â€” GPU-accelerated media processing
  # ---------------------------------------------------------------------------
  ffmpeg:
    image: linuxserver/ffmpeg:latest
    container_name: plexmind-ffmpeg
    restart: "no"
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - "${MOVIES_DIR:-/mnt/data/media/Movies}:/media/movies"
      - "${TV_DIR:-/mnt/data/media/TV Shows}:/media/tv"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
